<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面｜表彰台 画像差し替え</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN",sans-serif;background:#1a2030;color:#c8d3e8;min-height:100vh;padding:40px 20px}
.wrap{max-width:860px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.12)}
.header h1{font-size:1.4rem;font-weight:700;color:#fff}
.badge{background:#c19a3c;color:#2a2205;font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:100px;letter-spacing:.08em}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:32px}
@media(max-width:640px){.grid{grid-template-columns:1fr}}
.slot{background:#26375d;border:2px dashed rgba(255,255,255,.2);border-radius:14px;padding:20px;text-align:center;transition:border-color .2s}
.slot.has-img{border-color:#c19a3c;border-style:solid}
.slot .medal{font-size:2rem;margin-bottom:10px}
.slot h3{font-size:.9rem;font-weight:700;color:#fff;margin-bottom:14px}
.preview{width:100%;aspect-ratio:9/15;border-radius:10px;overflow:hidden;background:#1a2030;margin-bottom:14px;position:relative;display:flex;align-items:center;justify-content:center;color:#5c6a8a;font-size:.82rem}
.preview img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.file-btn{display:block;background:rgba(255,255,255,.08);color:#c8d3e8;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 16px;font-size:.85rem;cursor:pointer;transition:background .2s;width:100%;text-align:center}
.file-btn:hover{background:rgba(255,255,255,.15)}
.file-input{display:none}
.clear-btn{display:block;background:transparent;color:#d0392b;border:1px solid #d0392b;border-radius:8px;padding:6px 14px;font-size:.8rem;cursor:pointer;margin-top:8px;transition:background .2s;width:100%}
.clear-btn:hover{background:rgba(208,57,43,.15)}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.save-btn{background:#06c755;color:#0b3d1e;font-weight:700;font-size:1rem;border:none;border-radius:12px;padding:15px 44px;cursor:pointer;transition:transform .18s}
.save-btn:hover{transform:translateY(-2px)}
.preview-btn{background:transparent;color:#c8d3e8;border:1px solid rgba(255,255,255,.3);border-radius:12px;padding:15px 32px;cursor:pointer;font-size:.95rem;text-decoration:none;display:inline-flex;align-items:center}
.preview-btn:hover{background:rgba(255,255,255,.08)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#06c755;color:#0b3d1e;font-weight:700;padding:12px 28px;border-radius:100px;font-size:.95rem;transition:transform .3s;pointer-events:none;white-space:nowrap;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:#d0392b;color:#fff}
.note{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:14px 18px;font-size:.82rem;color:#8f9bb8;line-height:1.8}
.note b{color:#c8d3e8}
.status{text-align:center;font-size:.82rem;color:#8f9bb8;margin-bottom:20px}
.status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b;margin-right:6px}
.status .dot.ok{background:#3ba55d}
.status .dot.err{background:#d0392b}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>🏆 表彰台 管理画面</h1>
      <p style="font-size:.8rem;color:#5c6a8a;margin-top:4px">画像を差し替えてLPの表彰台セクションに即反映（PC・スマホ共通）</p>
    </div>
    <span class="badge">ADMIN</span>
  </div>

  <div class="status" id="status"><span class="dot" id="statusDot"></span><span id="statusText">サーバーに接続中…</span></div>

  <div class="grid">
    <div class="slot" id="slot-0">
      <div class="medal">🥇</div>
      <h3>報告①</h3>
      <div class="preview" id="preview-0"><span>画像未設定</span></div>
      <label class="file-btn">📁 画像を選択<input type="file" accept="image/*" class="file-input" data-slot="0"></label>
      <button class="clear-btn" data-clear="0">🗑 削除</button>
    </div>
    <div class="slot" id="slot-1">
      <div class="medal">🥈</div>
      <h3>報告②</h3>
      <div class="preview" id="preview-1"><span>画像未設定</span></div>
      <label class="file-btn">📁 画像を選択<input type="file" accept="image/*" class="file-input" data-slot="1"></label>
      <button class="clear-btn" data-clear="1">🗑 削除</button>
    </div>
    <div class="slot" id="slot-2">
      <div class="medal">🥉</div>
      <h3>報告③</h3>
      <div class="preview" id="preview-2"><span>画像未設定</span></div>
      <label class="file-btn">📁 画像を選択<input type="file" accept="image/*" class="file-input" data-slot="2"></label>
      <button class="clear-btn" data-clear="2">🗑 削除</button>
    </div>
  </div>

  <div class="actions">
    <button class="save-btn" id="saveBtn">💾 保存してLPに反映する</button>
    <a class="preview-btn" href="index.html" target="_blank">👁 LPを確認する</a>
  </div>

  <div class="note">
    <b>使い方</b><br>
    1. 各スロットの「画像を選択」からDiscordのスクリーンショットを選ぶ<br>
    2.「保存してLPに反映する」を押す<br>
    3. PCでもスマホでも同じ画像がLPに表示されます<br>
    <br>
    <b>注意</b>：画像サイズが大きい場合は自動で圧縮されます。
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://trade-gakuen-discord.hokonohara9465.workers.dev';
const imgs = ['','',''];

function showToast(msg, isError=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast'+(isError?' error':'')+' show';
  setTimeout(()=>t.className='toast'+(isError?' error':''),2500);
}

function setStatus(ok, msg){
  document.getElementById('statusDot').className='dot'+(ok===true?' ok':ok===false?' err':'');
  document.getElementById('statusText').textContent=msg;
}

function renderPreviews(){
  imgs.forEach((src,i)=>{
    const p=document.getElementById('preview-'+i);
    const s=document.getElementById('slot-'+i);
    p.innerHTML=src?`<img src="${src}" alt="報告${i+1}">`:'<span>画像未設定</span>';
    s.classList.toggle('has-img',!!src);
  });
}

// サーバーから現在の画像を読み込む
async function loadFromServer(){
  try{
    setStatus(null,'サーバーに接続中…');
    const res=await fetch(`${WORKER}/results`);
    if(!res.ok)throw new Error(res.status);
    const data=await res.json();
    data.forEach((src,i)=>{if(src)imgs[i]=src;});
    renderPreviews();
    setStatus(true,'サーバーと接続済み・画像を読み込みました');
  }catch(e){
    setStatus(false,'サーバーへの接続に失敗しました');
  }
}
loadFromServer();

// 画像圧縮
function compressImage(file, maxWidth=900, quality=0.75){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let w=img.width, h=img.height;
        if(w>maxWidth){h=Math.round(h*maxWidth/w);w=maxWidth;}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ファイル選択
document.querySelectorAll('.file-input').forEach(input=>{
  input.addEventListener('change',async e=>{
    const slot=+e.target.dataset.slot;
    const file=e.target.files[0];
    if(!file)return;
    showToast('画像を圧縮中…');
    const compressed=await compressImage(file);
    imgs[slot]=compressed;
    renderPreviews();
    showToast('画像を選択しました。保存ボタンを押してください。');
  });
});

// 削除
document.querySelectorAll('.clear-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const slot=+btn.dataset.clear;
    imgs[slot]='';
    renderPreviews();
  });
});

// 保存
document.getElementById('saveBtn').addEventListener('click',async()=>{
  try{
    showToast('保存中…');
    const res=await fetch(`${WORKER}/results`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({images:imgs})
    });
    if(!res.ok)throw new Error(res.status);
    showToast('✅ 保存しました！PCもスマホも反映されます');
  }catch(e){
    showToast('❌ 保存に失敗しました。もう一度お試しください。',true);
  }
});
</script>
</body>
</html>
